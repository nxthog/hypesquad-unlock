<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord HypeSquad Manager</title>
    <!-- Modern Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="./images/logo.png">
    <link rel="apple-touch-icon" href="./images/logo.png">
    <meta name="google-site-verification" content="1xWTL9GsVehj53Mtymtb0oI0csOm-fOOo1C4YwpJl0o" />
    <meta name="description" content="A secure, modern tool to instantly change and manage your Discord HypeSquad badges (Bravery, Brilliance, Balance) via Web or Desktop app." />
    <meta name="keywords" content="discord, hypesquad, manager, badge changer, bravery, brilliance, balance, tool" />
    <meta name="author" content="Efe Kırbaş" />
    
    <!-- AEO / GEO (AI Search) Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "Discord HypeSquad Manager",
          "operatingSystem": "Windows, WebBrowser",
          "applicationCategory": "UtilitiesApplication",
          "description": "An open-source utility that allows users to seamlessly switch their Discord HypeSquad badge (Bravery, Brilliance, Balance) instantly without using the Discord desktop app.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "How to change my Discord HypeSquad badge easily?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "You can use the Discord HypeSquad Manager web or desktop application. Simply enter your token or login via Discord securely, select Bravery, Brilliance, or Balance, and click 'Equip Badge'."
              }
            },
            {
              "@type": "Question",
              "name": "Is Discord HypeSquad Manager safe to use?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. It is an open-source tool. Your Discord token is never stored externally or sent to any server other than Discord's official API."
              }
            }
          ]
        }
      ]
    }
    </script>
</head>

<body>
    <!-- Top Right Actions -->
    <div class="top-actions">
        <a href="https://github.com/efekrbas/discord-hypesquad-manager/releases/tag/v1.0.4" target="_blank" class="download-app-btn" title="Download Desktop App">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span>Download Desktop App</span>
        </a>
        
        <a href="https://github.com/efekrbas/discord-hypesquad-manager" target="_blank" class="github-link" title="View Source Code">
            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
            </svg>
        </a>
    </div>

    <!-- Animated background glowing orbs -->
    <div class="bg-container">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <div class="container glass-panel">
        <div class="header">
            <div class="header-logo-wrapper">
                <img src="./images/logo.png" alt="Logo" class="header-logo">
            </div>
            <h1>HypeSquad Manager</h1>
            <p class="subtitle">Easily manage your Discord HypeSquad badges</p>
        </div>

        <div class="main-content">
            <!-- Login Section -->
            <div id="loginSection" class="token-section gs-reveal">
                <!-- Electron Login -->
                <div id="electronLoginContainer" class="hidden">
                    <button id="electronLoginBtn" class="action-btn set-btn premium-btn electron-login-btn">
                        <svg class="discord-icon" viewBox="0 0 24 24" width="22" height="22"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/></svg>
                        <span class="btn-text">Login with Discord</span>
                        <div class="btn-glow"></div>
                    </button>
                </div>

                <div id="webTokenContainer">
                    <div class="token-header">
                        <label for="token">Discord Token</label>
                        <a href="https://youtu.be/rcwWex7aqTo?si=sclN_xB7lPlk3eoE" target="_blank" class="help-link">How to get your token?</a>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="token" placeholder="Paste your Discord token..." autocomplete="off">
                        <button id="toggleToken" class="toggle-btn" title="Show/Hide Token">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="security-note">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                        <span>Your token is never stored externally.</span>
                    </div>
                </div>
            </div>

            <!-- Profile Section (Hidden by default) -->
            <div id="profileSection" class="profile-section hidden">
                <div class="profile-card glass-panel-inner">
                    <div class="avatar-ring">
                        <img id="userAvatar" src="" alt="Avatar" class="profile-avatar">
                    </div>
                    <div class="profile-info">
                        <span class="profile-label">Authenticated as</span>
                        <h3 id="username">User</h3>
                    </div>
                    <button id="logoutBtn" class="logout-btn" title="Logout">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="badge-selection gs-reveal gs-delay-1">
                <h3>Select House</h3>
                <div class="badge-options">
                    <div class="badge-option bravery-card" data-house="2">
                        <div class="card-glow"></div>
                        <div class="badge-icon">
                            <img src="images/hypesquadbravery.svg" alt="Bravery">
                        </div>
                        <span class="badge-name">Bravery</span>
                    </div>
                    <div class="badge-option brilliance-card" data-house="3">
                        <div class="card-glow"></div>
                        <div class="badge-icon">
                            <img src="images/hypesquadbrilliance.svg" alt="Brilliance">
                        </div>
                        <span class="badge-name">Brilliance</span>
                    </div>
                    <div class="badge-option balance-card" data-house="1">
                        <div class="card-glow"></div>
                        <div class="badge-icon">
                            <img src="images/hypesquadbalance.svg" alt="Balance">
                        </div>
                        <span class="badge-name">Balance</span>
                    </div>
                </div>
            </div>

            <div class="action-buttons gs-reveal gs-delay-2">
                <button id="setBadge" class="action-btn set-btn premium-btn" disabled>
                    <span class="btn-text">Equip Badge</span>
                    <div class="btn-glow"></div>
                </button>
                <button id="removeBadge" class="action-btn remove-btn premium-btn secondary">
                    <span class="btn-text">Remove</span>
                </button>
            </div>

            <div class="status-section">
                <div id="status" class="status-message"></div>
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <span>Processing...</span>
                </div>
            </div>

            <div class="mobile-github-container">
                <a href="https://github.com/efekrbas/discord-hypesquad-manager" target="_blank" class="mobile-github-btn" title="View Source Code on GitHub">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                    </svg>
                    <span>View on GitHub</span>
                </a>
            </div>
        </div>
    </div>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
